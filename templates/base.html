<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
   "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
  <title>{{ title }}</title>
  <meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1">
  <style type="text/css">
    * {
      font-family: monospace;
    }
    body {
      background-color: #363636;
      color: #ffffff;
      font-family: monospace;
      margin: 0;
    }
    a { color: #cc6d00; text-decoration: underline; }
    a:visited { color: #6a3300; }
    a:hover { color: #fffb00; }
    .topbar {
      background-color: #a74300;
      color: #FFFFFF;
      padding: 6px;
    }
    .container {
      width: 85%;
      margin: 10px auto;
      border: 1px solid #783d20;
      background-color: #1e1e1e;
      padding: 15px;
    }
    .nav {
      background-color: #E0E0FF;
      padding: 4px;
      text-align: center;
      border-top: 1px solid #ffc599;
      border-bottom: 1px solid #ffc599;
    }
    .searchbox input[type="text"] {
      border: 2px inset #AAAAAA;
      background-color: #FFFFFF;
    }
    .searchbox input[type="submit"] {
      border: 2px outset #CCCCCC;
      background-color: #E0E0E0;
      font-weight: bold;
    }
    hr { color: #CCCCCC; border-color: #CCCCCC; height: 0px; }
    .footer {
      text-align: center;
      color: #a3a3a3;
      font-size: 10px;
    }
  </style>
</head>

<body>
  <table width="100%" border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td class="topbar">
        <table width="100%" border="0" cellspacing="0" cellpadding="4">
          <tr>
            <td><font size="+2"><b><a href="/" style="color:#FFFFFF; text-decoration:none;">Ablaze</a></b></font><sup> by ANW</sup></td>
            <td align="right" class="searchbox">
              <form action="/search" method="get">
                <input type="text" name="q" size="25" value="{{ query if query is not none else '' }}">
                <input type="submit" value="Search">
              </form>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

  <center>
    <div class="container">
      {% block content %}{% endblock %}
      <hr>
      <div class="footer">
        <i>A retro gateway to the modern web.</i><br>
        &copy; 2026 Ablaze by ANW. All rights reserved.
      </div>
    </div>
  </center>
  <br>
</body>
</html>
